services:
  database:
    image: postgres:18
    container_name: mentor-points-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - mentor-points-db:/var/lib/postgresql

volumes:
  mentor-points-db:
